<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Image Upload Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 8px; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background-color: #0073bb; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #005a91; }
        .hidden { display: none; }
        #status { font-weight: bold; margin-top: 15px; color: #333; }
    </style>
</head>
<body>

    <h2>🔒 Secure Image Upload Portal</h2>
    <div id="status">Please log in to continue.</div>

    <div id="login-section">
        <h3>User Login</h3>
        <input type="text" id="username" placeholder="Username / Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="loginUser()">Log In</button>
    </div>

    <div id="upload-section" class="hidden">
        <h3>Upload an Image</h3>
        <input type="file" id="file-input" accept="image/*">
        <button onclick="handleUpload()">Upload to Secure S3</button>
    </div>

    <script>
        // --- CONFIGURATION ZONE ---
        const API_INVOKE_URL = "https://your-url.amazonaws.com";
	const USER_POOL_ID = "your-pool-id";          
        const CLIENT_ID = "your-client-id";          
        // --------------------------

        let jwtToken = null;

        // 1. Handle User Authentication via Cognito
        function loginUser() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');

            const poolData = { UserPoolId: USER_POOL_ID, ClientId: CLIENT_ID };
            const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);
            const authenticationData = { Username: username, Password: password };
            const authenticationDetails = new AmazonCognitoIdentity.AuthenticationDetails(authenticationData);
            
            const userData = { Username: username, Pool: userPool };
            const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

            statusDiv.innerText = "Authenticating...";

            cognitoUser.authenticateUser(authenticationDetails, {
                onSuccess: function (result) {
                    // Extract the secure ID Token (JWT) needed for API Gateway
                    jwtToken = result.getIdToken().getJwtToken();
                    
                    statusDiv.innerText = "Login Successful!";
                    statusDiv.style.color = "green";
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('upload-section').classList.remove('hidden');
                },
                onFailure: function (err) {
                    statusDiv.innerText = "Error: " + (err.message || JSON.stringify(err));
                    statusDiv.style.color = "red";
                }
            });
        }

        // 2. Request Pre-signed URL and Upload Binary File Natively
        async function handleUpload() {
            const fileInput = document.getElementById('file-input');
            const statusDiv = document.getElementById('status');
            
            if (!fileInput.files.length) {
                alert("Please select a file first!");
                return;
            }

            const file = fileInput.files[0];
            statusDiv.innerText = "Requesting secure upload token from AWS...";

            try {
                // Step A: Exchange our Cognito JWT for a one-time S3 Pre-signed URL
                const response = await fetch(`${API_INVOKE_URL}/get-url`, {
                    method: "POST",
                    headers: {
                        "Authorization": jwtToken,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        fileName: file.name,
                        contentType: file.type
                    })
                });

                if (!response.ok) throw new Error("Failed to obtain pre-signed upload URL");
                
                const { uploadUrl } = await response.json();
                statusDiv.innerText = "Streaming image securely straight to S3...";

                // Step B: Direct Binary HTTP PUT transmission straight to your private S3 bucket
                const uploadResult = await fetch(uploadUrl, {
                    method: "PUT",
                    headers: { "Content-Type": file.type },
                    body: file
                });

                if (uploadResult.ok) {
                    statusDiv.innerText = "🎉 Success! Image securely saved in S3.";
                    statusDiv.style.color = "green";
                } else {
                    throw new Error("S3 Upload rejected.");
                }

            } catch (error) {
                statusDiv.innerText = "Upload Error: " + error.message;
                statusDiv.style.color = "red";
            }
        }
    </script>
</body>
</html>
